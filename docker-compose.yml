version: "3.9"

services:
  portainer:
    image: portainer/portainer-ce:latest
    container_name: portainer
    restart: unless-stopped
    ports:
      - "127.0.0.1:9000:9000" # Seguro: restrito localmente no host para evitar invasões
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - ./portainer/data:/data
    networks:
      - default

  redis:
    image: redis:7-alpine
    container_name: redis
    restart: unless-stopped
    command: >
      redis-server --appendonly yes --save 60 1000
    # O Redis não precisa de portas públicas pois as aplicações na 'infra-network'
    # acessam o container diretamente pelo hostname 'redis' na rede interna.
    # ports:
    #   - "127.0.0.1:6379:6379"
    volumes:
      - ./redis/data:/data
    networks:
      - default

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    environment:
      - TUNNEL_TOKEN=${TUNNEL_TOKEN} # Preencha no arquivo .env deste diretório
    networks:
      - default

  mysql:
    image: mysql:8.0
    container_name: mysql
    restart: unless-stopped
    command: --default-authentication-plugin=mysql_native_password --sql-mode=""
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-root}
      MYSQL_DATABASE: gestao
    volumes:
      - ./mysql/data:/var/lib/mysql
    ports:
      - "127.0.0.1:3306:3306" # Seguro: restrito localmente no host para evitar acessos externos
    networks:
      - default

  postgres:
    image: postgres:18-alpine
    container_name: postgres
    restart: unless-stopped
    shm_size: 256mb
    stop_grace_period: 1m
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-postgres}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - ./postgres/data:/var/lib/postgresql
    ports:
      - "127.0.0.1:5432:5432" # Seguro: acessível localmente no host e via túnel SSH
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - default

networks:
  default:
    name: infra-network
